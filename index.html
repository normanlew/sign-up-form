<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sign up Form</title>
        <script src="javascript.js" defer></script>
        <link rel="stylesheet" href="styles/style.css">
    </head>
    <body>
        <div class="logo">
            <div class="logo-banner">
                <img src="images/odin-lined.png"
                alt="Male Norse head with helmet" class="norse-image">
                <p class="norse-text">ODIN</p>
            </div>
            <div class="footer">
                <p class="image-credit">
                    Photo by <a href="https://haliewestphotography.com/">Haile West</a>
                    on <a href="https://unsplash.com/@haliewestphoto">Unsplash</a>
                </p>
            </div>
        </div>
        <div class="main">
            <div class="information">
                <p>This is not a real online service!  You know you need something
                    like this in your life to help you realize your deepest dreams.
                    Sign up now to get started.
                </p>
                <p>You <em>know</em> you want to.</p>
            </div>
            <div class="fields">
                <div class="exortation">
                    <p>Let's do this!</p>
                </div>
                <form id="submit-form">
                    <div class="names">
                        <div class="first_name">
                            <label for="first">FIRST NAME</label>
                            <input type="text" id="first" name="first">
                        </div>
                        <div class="last_name">
                            <label for="last">LAST NAME</label>
                            <input type="text" id="last" name="last">
                        </div>
                    </div>

                    <div class="contact">
                        <div class="email">
                            <label for="email_contact">EMAIL</label>
                            <input type="email" id="email_contact" name="email_contact">
                        </div>
                        <div class="phone">
                            <label for="phone_number">PHONE NUMBER</label>
                            <input type="number" id="phone_number" name="phone_number">
                        </div>
                    </div>

                    <div class="passwords">
                        <div class="password">
                            <label for="uncomfirmed">PASSWORD</label>
                            <input type="password" id="uncomfirmed" 
                            pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                            name="uncomfirmed">
                        </div>
                        <div class="confirm">
                            <label for="confirmed">CONFIRM PASSWORD</label>
                            <input type="password" id="confirmed"
                            pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                            name="confirmed">
                        </div>
                    </div>
                </form>
            </div>
            <div class="submission">
                <button type="submit" form="submit-form" value="form-submission" class="submit-button">
                Create Account</button>
                <p>Already have an account?  <a href="login.html" class="login">Log in</a></p>
            </div>
        </div>
    </body>
</html>
